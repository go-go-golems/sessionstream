schema: xgoja/v2
name: goja-redis-chatdemo-server
app:
  name: goja-redis-chatdemo-server
go:
  module: github.com/go-go-golems/sessionstream
  version: "1.26"
workspace:
  mode: auto
providers:
  - id: go-go-goja-host
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/host
    register: Register
  - id: go-go-goja-http
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/http
    register: Register
  - id: go-go-goja-core
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/core
    register: Register
  - id: sessionstream
    import: github.com/go-go-golems/sessionstream/pkg/js/modules/sessionstream/provider
    register: Register
  - id: sessionstream-chatdemo
    import: github.com/go-go-golems/sessionstream/pkg/js/modules/chatdemo/provider
    register: Register
runtime:
  modules:
    - provider: go-go-goja-host
      name: fs
      as: fs:assets
      config:
        embedded:
          allow: true
          mounts:
            - asset: app-assets
              mount: /app
    - provider: go-go-goja-http
      name: express
      as: express
    - provider: go-go-goja-core
      name: timer
      as: timer
    - provider: sessionstream
      name: sessionstream
      as: sessionstream
    - provider: sessionstream-chatdemo
      name: sessionstream.examples.chatdemo.v1
      as: sessionstream.examples.chatdemo.v1
sources:
  - id: sites
    kind: jsverbs
    from:
      dir: ../goja-chatdemo-server/verbs
    language: javascript
  - id: redis-tools
    kind: jsverbs
    from:
      dir: ./verbs
    language: javascript
  - id: app-assets
    kind: assets
    from:
      dir: ../goja-chatdemo-server/assets
commands:
  - id: verbs
    type: builtin.jsverbs
    name: verbs
    sources: [sites, redis-tools]
  - id: serve
    type: provider.command-set
    provider: go-go-goja-http
    name: serve
    mount: serve
    sources: [sites]
artifacts:
  - id: runtime
    type: runtime-package
    output: internal/xgojaruntime
    package: xgojaruntime
    sources: [sites, redis-tools]
  - id: embedded-assets
    type: embedded-assets
    sources: [app-assets]
